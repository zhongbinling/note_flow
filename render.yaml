services:
  - type: web
    name: noteflow
    runtime: node
    repo: https://github.com/zhongbinling/noteflow
    branch: main
    buildCommand: npm install && cd server && npm install && npx prisma generate
    startCommand: cd server && npm run start
    env: node
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: noteflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://noteflow.onrender.com
      - key: CORS_ORIGINS
        value: https://noteflow.onrender.com,https://zhongbinling.github.io

databases:
  - name: noteflow-db
    plan: free
    databaseName: noteflow
    user: noteflow_user
